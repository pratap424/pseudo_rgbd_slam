%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters (TUM fr1 Kinect)
#--------------------------------------------------------------------------------------------
# Source: TUM RGB-D Benchmark documentation
# https://cvg.cit.tum.de/data/datasets/rgbd-dataset/file_formats
#
# These are the CALIBRATED intrinsics of the Microsoft Kinect v1
# used in the TUM freiburg1 sequences.

Camera.type: "PinHole"

Camera.fx: 517.3
Camera.fy: 516.5
Camera.cx: 318.6
Camera.cy: 255.3

Camera.k1: 0.2624
Camera.k2: -0.9531
Camera.p1: -0.0054
Camera.p2: 0.0026
Camera.k3: 1.1633

Camera.width: 640
Camera.height: 480

# Camera frames per second 
Camera.fps: 30.0

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# Depth Parameters
#--------------------------------------------------------------------------------------------
# DepthMapFactor: raw_uint16_value / DepthMapFactor = depth_in_meters
#
# For TUM RGB-D: Kinect depth is stored as uint16 with factor 5000
# Our neural depth estimator (Node B) uses the same convention:
#   depth_uint16 = depth_meters * 5000.0
#
# This means:
#   - Value 5000  → 1.0 meter
#   - Value 10000 → 2.0 meters  
#   - Value 2500  → 0.5 meters
#   - Value 0     → no measurement (ignored by ORB-SLAM3)
DepthMapFactor: 5000.0

# Close/Far threshold. Baseline times.
# Points with depth > ThDepth * baseline are considered to be far
# and encoded differently. For RGB-D: baseline = bf/fx ≈ 0.075
ThDepth: 40.0

# Depth threshold for new map points
# Only keypoints with depth < this are used for mapping (meters)
# Set to 0 to use all (relies on ThDepth)
Camera.bf: 40.0

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------
# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 1000

# ORB Extractor: Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid
ORBextractor.nLevels: 8

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing
# a minimum response. Firstly we impose iniThFAST. If no corners are
# detected we impose a lower value minThFAST.
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
